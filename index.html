<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90 Days of Love & Blessings</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #ffb3c1;
            --background-color: #fff0f3;
            --text-color: #590d22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.15);
            margin-bottom: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        h1, h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .day-counter {
            font-size: 1.2rem;
            font-weight: bold;
            background: var(--secondary-color);
            padding: 8px 20px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* Scratch Card Styles */
        .scratch-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .scratch-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border: 2px dashed var(--primary-color);
            border-radius: 15px;
        }

        .scratch-back p {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.5;
            margin: 10px 0;
        }

        .scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: pointer;
            z-index: 10;
        }

        /* Quiz Styles */
        .quiz-option {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--background-color);
            border: 2px solid var(--secondary-color);
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            color: var(--text-color);
            text-align: center;
        }

        .quiz-option:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        .correct {
            background: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724 !important;
        }

        .wrong {
            background: #f8d7da !important;
            border-color: #f5c6cb !important;
            color: #721c24 !important;
        }

        .status-msg {
            font-weight: bold;
            margin-top: 15px;
            min-height: 24px;
        }
    </style>
</head>

        <h2>இன்றைய காதல் வினாடி வினா 🎮</h2>
        <p id="quizQuestion" style="font-size: 1.1rem; font-weight: 600;"></p>
        <div id="quizOptionsContainer"></div>
        <div class="status-msg" id="quizStatus"></div>
    </div>

        <div class="scratch-container">

                <p id="loveKavithai" style="color: var(--primary-color); font-style: italic; white-space: pre-line;"></p>
            </div>
            <canvas id="scratchCanvas" class="scratch-canvas" width="280" height="280"></canvas>
        </div>
    </div>

            "பூமிக்கு மழை எவ்வளவு முக்கியமோ, என் வாழ்விற்கு உன் அன்பு அவ்வளவு முக்கியம்,\nநீதான் என் உலகத்தின் மையம், என் இதயத்தின் சொந்தக்காரன்! 🌧️",
            "கீபோர்டின் வெள்ளை கருப்பு கட்டைகளில் பாயும் இசை போல,\nஎன் வாழ்க்கையின் இன்ப துன்பங்களில் நீதான் என் அழகிய நாதம்! 🎹",
            "உன் ஒரு வார்த்தை போதும் என் சோகங்கள் யாவும் பறந்து போக,\nஎன் அன்பே, உன்னை எப்போதும் சிரிக்க வைப்பதே என் லட்சியம்! 😊",
            "நீ என் வாழ்வில் வந்த அந்த நாள் தான் என் வாழ்வின் திருநாள்,\nஉன்னோடு பயணிக்கும் ஒவ்வொரு பாதையும் பூக்களால் நிறைகிறது! 🛣️",
            "யார் என்ன சொன்னாலும் நம் காதலின் ஆழத்தை யாராலும் அளக்க முடியாது,\nஎன் இதயக் கூட்டுக்குள் உன்னை தவிர வேறு யாருக்கும் இடமும் கிடையாது! 🔒",
            "டிரம்ஸின் அதிரடி துடிப்பு போல என் இதயம் துடிக்கிறது உன்னை காணும் போதெல்லாம்,\nஎன் செல்ல ஐசக், நீ இல்லாமல் என் நாட்கள் நகர்வது பெரும் பாடு! 🥁",
            "உன் அன்பில் நான் உருகிப் போகிறேன் ஒவ்வொரு நாளும்,\nஉன்னோடு வாழும் வாழ்க்கைக்காக இறைவனுக்கு நன்றி சொல்வேன் எப்போதும்! 🥹",
            "காலை பனித்துளி போல உன்னோடு பேசும் நொடிகள் என் மனதை குளிர்விக்கிறது,\nஎன் பேரன்பே, உன் நினைவுகள் எப்போதும் என் நெஞ்சில் சுழல்கிறது! ❄️",
            "உன் கையில் இருக்கும் மோதிரமாய் நான் மாற ஆசை,\nஉன் விரல்களைத் தொட்டுக்கொண்டே இருக்க என் இதயத்திற்கு பேராசை! 💍",
            "என் கவிதைகளின் நாயகனே, உன் அழகுக்கு முன்னால் நிலவும் தோற்றுப்போகும்,\nஉன் உண்மையான அன்பு ஒன்றுதான் என் வாழ்நாள் முழுக்க எனக்கு வேண்டும்! 👑",
            "கண் இமைக்கும் நேரத்தில் உன் முகம் என் நினைவுக்கு வருகிறது,\nநீ என்னருகில் இல்லாத போது என் இதயம் உன்னை தேடி அலைகிறது! 🕊️",
            "உன் madiyil தலைசாய்ந்து படுத்துக்கொள்ளும் அந்த ஒரு நொடிக்காக,\nஎன் வாழ்நாளின் எல்லா நாட்களையும் தாராளமாக விட்டுக்கொடுப்பேன்! 🛌",
            "நம் காதல்ளின் ஆழம் வார்த்தைகளில் அடங்காத ஒரு அற்புதம்,\nநீ என் வாழ்வில் கிடைத்தது நான் செய்த மிகப்பெரிய புண்ணியம்! 🔮",
            "என் உலகமே உன்னைச் சுற்றித்தான் சுழல்கிறது மிஸ்டர் மியூசிசியன்,\nஉன் இசையில் என் இதயத்தை முழுமையாக தொலைத்துவிட்டேன்! 🎶",
            "உன் புன்னகை என் இதயத்தில் ஆயிரம் பூக்களை பூக்க வைக்கிறது,\nநீ அருகில் இருந்தால் என் உலகம் இன்னும் அழகாக மாறுகிறது! 💐",
            "நம் காதல் பயணத்தில் எத்தனை தடைகள் வந்தாலும் தகர்த்து எறிவோம்,\nநாம் இருவர் அல்ல, ஒரே உயிர் என்பதை உலகிற்கு காட்டுவோம்! 🤝",
            "உன் குரலைக் கேட்கும் வரை என் நாட்கள் முழுமை பெறுவதில்லை,\nஅன்பே ஐசக், உன் நினைவுகள் இல்லாத நொடிகள் என் வாழ்வில் இல்லை! 📞",
            "குளிர்காலத்து சூரியன் போல உன் அன்பு என் மனதை இதமாக்குகிறது,\nஉன் நினைவுகளின் அரவணைப்பு எனக்குள் எப்போதும் எரிகிறது! 🔥",
            "உன் குறும்பு பேச்சுகள் தான் என் மனசின் ஆகச்சிறந்த மருந்து,\nஎன் செல்லமே, உன்னை ஆழமாக காதலிப்பதே என் அட்ட்ரஸ்! 🏡",
            "உன் விரல்களோடு என் விரல்கள் கோர்த்து நடக்கும் போது,\nஇந்த உலகமே நம் காதலின் அழகை பார்த்து பொறாமைப்படும்! 🌍",
            "என் இதயத்துடிப்பின் மியூசிக் டைரக்டர் நீ மட்டும்தான்,\nநீ அமைக்கும் மெலடியில் தான் என் வாழ்க்கை அழகாக நகர்கிறது! 🎼",
            "உன் கண்களில் தெரியும் அந்த லவ், எனக்குள் புது எனர்ஜியை தருது,\nஉன்னை இன்னும் இன்னும் காதலிக்க என் மனசு துடிக்குது! 💕",
            "காற்றோடு பேசும் கவிதை போல நம் காதல்,\nயாராலும் பிரிக்க முடியாத ஒரு உன்னத பந்தம்! 🌪️",
            "உன் ஒரு முத்தத்தில் என் உலகமே ஸ்தம்பித்து போகிறது,\nபேரன்பே, உன்னிடத்தில் என்னை முழுமையாக தந்துவிட்டேன்! 💋",
            "நம் காதலுக்கு எல்லையே இல்லை, அது வானத்தை விட பெரியது,\nஉன்னை என் கணவனாக அடைய என் இதயம் தவம் கிடக்கிறது! 🧎‍♀️",
            "உன் தோளோடு தோள் நின்று உன் எல்லா கனவுகளையும் நிஜமாக்குவேன்,\nஉன் வெற்றிகளின் பின்னால் எப்போதும் உன் நிழலாக நான் இருப்பேன்! 🏆",
            "என் அன்பான ஐசக், உன் கண்கள் தான் என் உலகத்தின் திசைகாட்டி,\nநீ காட்டும் பாதையில் பயமின்றி பயணிப்பேன் உன்னை நம்பி! 🧭",
            "உன் க்யூட் கோபங்கள் கூட என் மேல் உனக்கிருக்கும் அக்கறையை சொல்லும்,\nநீ செல்லமாக திட்டும் போது என் இதயம் இன்னும் உன்னை காதலிக்கும்! 🤬❤️",
            "நம் நினைவுகளின் ஆல்பம் என் மனதில் எப்போதும் ஓடிக்கொண்டே இருக்கிறது,\nஒவ்வொரு பக்கத்திலும் உன் முகம் மட்டுமே அழகாக ஜொலிக்கிறது! 📸",
            "உன் கரம் பிடித்து மழையில் நனையும் அந்த ஒரு நொடி,\nஎன் வாழ்வின் மிக அற்புதமிக்க தருணமாக மாறும் அன்பே! 🌧️",
            "உன் mahrbil சாய்ந்து உன் இதயத்துடிப்பை கேட்கும் சுகமே தனி,\nஅங்குதான் என் ஆன்மா தன் நிம்மதியான வீட்டை கண்டுகொண்டது! 🏠",
            "நீ வாசிக்கும் கிதாரின் ஒவ்வொரு கம்பியும் என் இதயத்தின் நரம்புகள்,\nநீ மீட்ட மீட்ட எனக்குள் காதல் சுரந்துகொண்டே இருக்கும்! 🎸",
            "என் உலகமே நீதான், என் வாழ்வின் அர்த்தமும் நீதான்,\nஉன்னை பிரிந்து வாழும் ஒரு வாழ்க்கை எனக்கு தேவையே இல்லை! ❌",
            "உன் புன்னகை என் விடியலின் புதிய வெளிச்சம்,\nஉன்னோடு வாழும் ஒவ்வொரு நாளும் என் வாழ்வின் உச்சம்! ☀️",
            "பாதி தூக்கத்தில் கூட உன் நினைவுகள் தான் என்னை எழுப்புகிறது,\nநம் காதல் எந்த காலத்திலும் அழியாத ஒரு காவியமாக மாறுகிறது! 🛌✨",
            "என் அன்பே, உன் இதயம் ஒரு சுத்தமான தங்கம்,\nஅங்கு எனக்கு இடம் கொடுத்ததற்கு என் வாழ்நாள் முழுக்க கடமைப்பட்டிருக்கிறேன்! 🥇",
            "நீ அருகில் இருந்தால் என் மௌனம் கூட அழகிய பாட்டாகிவிடும்,\nநீ தூரமாய் போனால் என் பாட்டு கூட வெறும் மௌனமாகிவிடும்! 🎤",
            "உன் ஒரு பார்வையில் என் கவலைகள் பனி போல உருகிப் போகிறது,\nஎன் ராஜா, உன்னை எப்போதும் என் கண்ணுக்குள் வைத்து காப்பேன்! 👑",
            "நம் காதல் ஒரு தீபச்சுடர் போல எப்போதும் பிரகாசித்துக் கொண்டே இருக்கும்,\nஎந்த ஒரு சூறாவளியாலும் நம் காதலை அணைக்க முடியாது! 🕯️",
            "உன் அன்பு தான் எனக்குள் இருக்கும் அத்தனை கவிதைகளுக்கும் ஊற்று,\nநீ இல்லாத என் வாழ்க்கை ஒரு வெற்று பாலைவனம் போன்றது! 🌵",
            "என் இதயக் கூட்டுக்குள் உன்னை பத்திரமாக பூட்டி வைத்திருக்கிறேன்,\nஅந்த சாவியை எப்போதோ கடலின் ஆழத்தில் வீசிவிட்டேன்! 🔑🌊",
            "உன்னோடு பேசும் ஒவ்வொரு நிமிடமும் எனக்குள் புது ஆயுள் பிறக்கிறது,\nஉன் குரல் தான் என் வாழ்வின் ஆகச்சிறந்த மியூசிக் தெரபி! 🎹",
            "உன் தோள்களில் சாய்ந்து கொள்ளும் போது இந்த உலகமே என் காலடியில்,\nபேரன்பே, உன்னை அடைந்த நான் தான் உலகிலேயே அதிர்ஷ்டசாலி! 🍀",
            "நம் காதல் என்றும் மாறாத ஒரு தெய்வீக பந்தம்,\nஇறைவன் எனக்கு தந்த மிக உன்னதமான பரிசு நீ மட்டும்தான்! 🎁",
            "உன் கரம் கோர்த்து நடக்கும் பாதைகள் யாவும் சொர்க்கமாக மாறுகிறது,\nநீ அருகில் இருந்தால் என் உலகம் முழுமை பெறுகிறது என் ஐசக்! 🌸",

            ["உருகிடுவேன் 😍 Loved", "செம ஹாப்பி ஆயிடுவேன் 💃 Happy", "வார்த்தையே வராது 🥹 உருகிட்டேன்"],
            ["நெஞ்சுக்குள் ஜொலிக்கும் 🌟 Loved", "முகத்தில் புன்னகை வரும் 😊 Happy", "இதயம் உருகிப்போகும் 💓 உருகிட்டேன்"]
        ];

        while(quizDatabase.length < 90) {
            let currentDayNum = quizDatabase.length + 1;
            quizDatabase.push({
                q: romanticPrompts[currentDayNum % romanticPrompts.length],
                a: [...optionsTemplates[currentDayNum % optionsTemplates.length]],
                correct: currentDayNum % 3
            });
        }

        // --- 📅 DATE LOGIC (START: JUNE 10, 2026) ---
        const startDate = new Date("2026-06-10T00:00:00");
        const today = new Date();
        const diffTime = today - startDate;
        let currentDayIndex = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        
        if (currentDayIndex < 0) currentDayIndex = 0; 
        if (currentDayIndex >= 90) currentDayIndex = 89; 

        // --- 🛠️ INITIALIZATION ---
        document.getElementById("quizDayLabel").innerText = `நாள்: ${currentDayIndex + 1} / 90`;
        document.getElementById("bibleVerse").innerText = versesDatabase[currentDayIndex];
        document.getElementById("loveKavithai").innerText = kavithaigalDatabase[currentDayIndex];

        function loadQuiz() {
            const currentQuiz = quizDatabase[currentDayIndex];
            document.getElementById("quizQuestion").innerText = currentQuiz.q;
            const optionsContainer = document.getElementById("quizOptionsContainer");
            optionsContainer.innerHTML = "";

            currentQuiz.a.forEach((option, index) => {
                const button = document.createElement("button");
                button.className = "quiz-option";
                button.innerText = option;
                button.onclick = () => checkAnswer(index, button);
                optionsContainer.appendChild(button);
            });
        }

        // --- 🚀 LARAVEL BACKEND SUBMISSION VIA AJAX ---
        function checkAnswer(selectedIndex, clickedButton) {
            const currentQuiz = quizDatabase[currentDayIndex];
            const options = document.getElementsByClassName("quiz-option");
            
            for (let btn of options) { btn.disabled = true; }

            const statusMsg = document.getElementById("quizStatus");
            const selectedText = currentQuiz.a[selectedIndex];

            // ⚠️ லாராவெல் ரூட்டிற்கு பேக்கிரவுண்டில் டேட்டாவை அனுப்புதல் (Fetch API)
            fetch(SUBMIT_ROUTE_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRF-TOKEN": document.querySelector('meta[name="csrf-token"]').getAttribute('content')
                },
                body: JSON.stringify({
                    day: `Day ${currentDayIndex + 1}`,
                    answer: selectedText
                })
            })
            .then(res => res.json())
            .then(data => console.log("Laravel Backend Response:", data))
            .catch(err => console.error("Error sending data to Laravel:", err));

            // திரையில் சரியான/தவறான விடைகளைக் காட்டுதல்
            if (selectedIndex === currentQuiz.correct) {
                clickedButton.classList.add("correct");
                statusMsg.style.color = "#155724";
                statusMsg.innerText = "சரியான பதில்! 🥰 அப்படியே கீழே வந்து கார்டை ஸ்க்ராட்ச் பண்ணுங்க!";
            } else {
                clickedButton.classList.add("wrong");
                options[currentQuiz.correct].classList.add("correct");
                statusMsg.style.color = "#721c24";
                statusMsg.innerText = "உங்க லவ் தான் முக்கியம்! ❤️ கீழே உள்ள கார்டை பாருங்க!";
            }

            // கார்டிற்கு ஸ்மூத் ஸ்க்ரோலிங் செய்தல்
            setTimeout(() => {
                document.getElementById("scratchCardSection").scrollIntoView({ 
                    behavior: 'smooth', 
                    block: 'center' 
                });
            }, 1200); 
        }

        // --- 🎨 SCRATCH CARD CANVAS LOGIC ---
        const canvas = document.getElementById("scratchCanvas");
        const ctx = canvas.getContext("2d");
        let isDrawing = false;

        function initScratchCard() {
            ctx.fillStyle = "#e0e0e0";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "20px Georgia";
            ctx.fillStyle = "#ff4d6d";
            ctx.textAlign = "center";
            ctx.fillText("இங்கே தேய்க்கவும்! 💖", canvas.width / 2, canvas.height / 2);
        }

        function scratch(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 25, 0, Math.PI * 2);
            ctx.fill();
        }

        canvas.addEventListener("mousedown", () => isDrawing = true);
        canvas.addEventListener("mouseup", () => isDrawing = false);
        canvas.addEventListener("mousemove", scratch);
        canvas.addEventListener("touchstart", (e) => { isDrawing = true; e.preventDefault(); });
        canvas.addEventListener("touchend", () => isDrawing = false);
        canvas.addEventListener("touchmove", (e) => { scratch(e); e.preventDefault(); });

        loadQuiz();
        initScratchCard();
    </script>
</body>
</html>
