<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jianna Turns One</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top, #ffe4ec, #ffd1dc, #ffc0cb);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Card */
.card{
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  border-radius:30px;
  padding:25px;
  width:90%;
  max-width:420px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
  border: 2px solid rgba(255,255,255,0.5);
  animation: fadeIn 1.5s ease;
}

/* Fade animation */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* Cross */
.cross{
  font-size:32px;
  color:gold;
  animation:float 3s infinite,glow 2s infinite alternate;
}

/* Animations */
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0)}
}

@keyframes glow{
  from{text-shadow:0 0 5px gold}
  to{text-shadow:0 0 20px gold}
}

/* Title */
.title{
  font-family:'Playfair Display';
  color:#d4af37;
  font-size:22px;
  margin-top:10px;
}

/* Name */
.name{
  font-size:30px;
  color:#ff4f81;
  font-weight:bold;
  margin:10px 0;
}

/* Text */
.text{
  font-size:14px;
  color:#444;
  margin:10px 0;
  line-height:1.5;
}

/* Highlight */
.highlight{
  color:#d4af37;
  font-weight:bold;
}

/* Buttons */
.map-btn,.cut-btn{
  margin-top:12px;
  padding:10px 18px;
  border-radius:25px;
  border:none;
  background: linear-gradient(45deg,#d4af37,#ffd700);
  color:white;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.3s;
}

.map-btn:hover,.cut-btn:hover{
  transform:scale(1.05);
}

/* Countdown */
.countdown{
  font-weight:bold;
  color:#d4af37;
  margin-top:12px;
  font-size:15px;
}

/* Cake */
.cake{
  font-size:55px;
  transition:0.5s;
}
.cake.cut{
  transform:rotate(-10deg) scale(0.9);
}

/* Bible */
.bible{
  margin-top:15px;
  font-style:italic;
  font-size:13px;
  opacity:0.9;
}
.bible span{
  color:#d4af37;
  font-weight:bold;
}

/* Location Pin */
.location-pin{
  font-size:32px;
  animation:bounce 1.5s infinite;
}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
</style>
</head>

<body>

<div class="card">

<div class="cross">✝️</div>

<div class="title">Royal Birthday Celebration</div>

<div class="name">
👑 Jianna 👑<br>
<span style="font-size:16px;">Turns ONE | 1வது பிறந்தநாள்</span>
</div>

<div class="text">
With God’s grace and abundant love
</div>

<div class="text">
📅 April 24, Friday | ஏப்ரல் 24<br>
⏰ 6:30 PM | மாலை 6:30 மணி
</div>

<div class="location-pin">📍</div>

<div class="text">
S.S Convention Hall,<br>
Ponmeni, Madurai - 16
</div>

<a href="https://share.google/cxDQMwlbSag01pnN2"
target="_blank" class="map-btn">📍 View Location</a>

<div id="countdown" class="countdown"></div>

<div class="cake">🎂</div>
<button onclick="cutCake()" class="cut-btn">🎉 Cut Cake</button>

<div id="verseBox" class="bible"></div>

</div>

<script>
// Countdown
const eventDate=new Date("April 24, 2026 18:30:00").getTime();
setInterval(()=>{
 let d=eventDate-new Date().getTime();
 document.getElementById("countdown").innerHTML=
 "⏳ "+Math.floor(d/86400000)+"d "+
 Math.floor(d%86400000/3600000)+"h "+
 Math.floor(d%3600000/60000)+"m";
},1000);

// Cake
function cutCake(){
 document.querySelector('.cake').classList.add('cut');
 alert("🎉 Happy Birthday Jianna 🎂👑");
}

// Bible rotation
const verses=[
["Children are a gift from the Lord","பிள்ளைகள் கர்த்தரால் தரப்படும் சுதந்தரம்","Psalm 127:3"],
["The Lord bless you and keep you","கர்த்தர் உன்னை ஆசீர்வதிப்பாராக","Numbers 6:24"],
["Before I formed you I knew you","நான் உன்னை முன்பே அறிந்தேன்","Jeremiah 1:5"]
];
let i=0;
setInterval(()=>{
 document.getElementById("verseBox").innerHTML=
 verses[i][0]+"<br>"+verses[i][1]+"<span>"+verses[i][2]+"</span>";
 i=(i+1)%verses.length;
},4000);
</script>

</body>
</html>
