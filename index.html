<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jianna's 1st Birthday | Neumorphic</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@700&family=Noto+Sans+Tamil:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0e5ec;
            --gold: #d4af37;
            --shadow-light: rgba(255, 255, 255, 0.8);
            --shadow-dark: rgba(163, 177, 198, 0.8);
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Modern Visitor Counter Badge */
        .visitor-badge {
            position: absolute;
            top: 25px;
            background: var(--bg);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #7f8c9f;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card {
            background: var(--bg);
            width: 100%;
            max-width: 420px;
            padding: 60px 30px 40px;
            border-radius: 50px;
            box-shadow: 20px 20px 60px var(--shadow-dark), -20px -20px 60px var(--shadow-light);
            text-align: center;
            position: relative;
        }

        .bible-verse {
            font-family: 'Noto Sans Tamil', sans-serif;
            color: #5c6b7f;
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 25px;
        }

        .name {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            color: var(--gold);
            margin: 10px 0;
        }

        .turning-one {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 30px;
        }

        /* Neumorphic Countdown */
        #countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 25px 0;
        }

        .time-box {
            padding: 15px 5px;
            border-radius: 20px;
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }

        .time-num { display: block; font-size: 1.5rem; font-weight: 700; color: var(--gold); }
        .time-label { font-size: 0.6rem; color: #7f8c9f; text-transform: uppercase; }

        .details {
            border-top: 2px dashed rgba(212, 175, 55, 0.2);
            border-bottom: 2px dashed rgba(212, 175, 55, 0.2);
            padding: 20px 0;
            margin: 25px 0;
        }

        .venue { font-family: 'Cinzel', serif; font-weight: 700; font-size: 1.1rem; color: #222; margin-top: 5px; display: block;}

        .btn-map {
            padding: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            display: block;
            color: white;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            transition: 0.3s;
        }

        .btn-map:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <div class="bible-verse">
            "நன்மையினால் உன் வாயைத் திருப்தியாக்குகிறார்;<br>
            கழுகுக்குச் சமானமாய் உன் வயது<br>
            திரும்ப வாலவயதுபோலாகிறது."<br>
            <strong>— சங்கீதம் 103:5</strong>
        </div>

        <div class="name">Jianna</div>
        <div class="turning-one">is turning one</div>

        <div id="countdown">
            <div class="time-box"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
            <div class="time-box"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-box"><span class="time-num" id="minutes">00</span><span class="time-label">Mins</span></div>
            <div class="time-box"><span class="time-num" id="seconds">00</span><span class="time-label">Secs</span></div>
        </div>

        <div class="details">
            <p style="color: #b8860b; font-weight: 700;">FRIDAY, APRIL 24 @ 6:30 PM</p>
            <span class="venue">S.S. CONVENTION HALL<br>Back Side of Sri Krishna Sweets, </span>
            <p style="font-size: 0.8rem; opacity: 0.8;">Ponmeni, Madurai - 625016</p>
        </div>

        <a href="https://share.google/HeT5wEqpSGrinQdda" target="_blank" class="btn-map">📍 NAVIGATE TO VENUE</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // 1. Fixed Visitor Counter Logic
        function runCounter() {
            let currentViews = localStorage.getItem('invitation_views');
            if (!currentViews) {
                currentViews = 142; // Starting number
            }
            currentViews = parseInt(currentViews) + 1;
            localStorage.setItem('invitation_views', currentViews);
            document.getElementById('viewCount').innerText = currentViews;
        }
        runCounter();

        // 2. Confetti Effect
        window.onload = () => {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#d4af37', '#ffffff'] });
        };

        // 3. Countdown Logic
        const target = new Date("April 24, 2026 18:30:00").getTime();
        function update() {
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('minutes').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('seconds').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
