<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // --- 📊 90 DAYS MASTER DATA (With 100% Stable Music & Themes) ---
        const themeDatabase = [];
        const bgStyles = [
            { bg: "radial-gradient(at 0% 0%, #061c12 0, transparent 55%), radial-gradient(at 50% 0%, #0a2b1d 0, transparent 60%), radial-gradient(at 100% 0%, #04140e 0, transparent 55%)", card: "rgba(10, 35, 24, 0.45)", glow: "#d4af37", modal: "#0b2116", scratch: "#163d2a", content: "#0f3020" }, 
            { bg: "radial-gradient(at 0% 0%, #200b0b 0, transparent 55%), radial-gradient(at 50% 0%, #3a1111 0, transparent 60%), radial-gradient(at 100% 0%, #150505 0, transparent 55%)", card: "rgba(40, 15, 15, 0.45)", glow: "#e5c158", modal: "#250c0c", scratch: "#421616", content: "#331010" }, 
            { bg: "radial-gradient(at 0% 0%, #09122c 0, transparent 55%), radial-gradient(at 50% 0%, #111b3d 0, transparent 60%), radial-gradient(at 100% 0%, #050a1a 0, transparent 55%)", card: "rgba(15, 25, 55, 0.45)", glow: "#ddb342", modal: "#0d1530", scratch: "#1c2a5c", content: "#141f47" }, 
            { bg: "radial-gradient(at 0% 0%, #1a0b2e 0, transparent 55%), radial-gradient(at 50% 0%, #2b104a 0, transparent 60%), radial-gradient(at 100% 0%, #10051d 0, transparent 55%)", card: "rgba(35, 15, 58, 0.45)", glow: "#f1c40f", modal: "#1e0b33", scratch: "#37155e", content: "#291047" }, 
            { bg: "radial-gradient(at 0% 0%, #2c1a04 0, transparent 55%), radial-gradient(at 50% 0%, #422807 0, transparent 60%), radial-gradient(at 100% 0%, #190f02 0, transparent 55%)", card: "rgba(50, 30, 8, 0.45)", glow: "#f39c12", modal: "#301d05", scratch: "#54330b", content: "#402708" }  
        ];

        // 🎵 Stable alternative audio stream links
        const audioTracks = [
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
            "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"
        ];

        for (let i = 0; i < 90; i++) {
            themeDatabase.push({
                style: bgStyles[i % bgStyles.length],
                audioUrl: audioTracks[i % audioTracks.length]
            });
        }

        // [Keep your versesDatabase and kavithaigalDatabase exactly here - I am skipping lines to keep it clean]
        const versesDatabase = ["சங்கீதம் 20:4 — உமது இருதயத்தின் விருப்பத்தின்படி உமக்குத் தந்தருளுவாராக.", "உபாகமம் 28:12 — கர்த்தர் உனக்குத் தமது நல்ல பொக்கிஷசாலையாகிய வானத்தைத் திறப்பார்." /* ... Copy paste your 90 verses here ... */];
        const kavithaigalDatabase = ["இன்று ஜூன் 10, நம் காதல் காவியத்தின் முதல் பக்கம்.\nஎன் இதயத்தின் ஒவ்வொரு துடிப்பும் உனக்கான மெலடி ஐசக்! ❤️" /* ... Copy paste your 90 kavithaigal here ... */];

        // 📅 Cross-browser safe date definition (Year, Month Index 0-11, Day, Hour, Minute)
        const startDate = new Date(2026, 5, 10, 0, 0, 0); // June 10, 2026
        const targetDate = new Date(2026, 8, 8, 0, 0, 0); // Sept 8, 2026

        const audio = document.getElementById("bgMusic");
        const musicBtn = document.getElementById("musicBtn");
        
        function getActiveDayIndex() {
            const now = new Date();
            const todayClean = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const startClean = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
            const dayIndex = Math.floor((todayClean - startClean) / (1000 * 60 * 60 * 24));
            return Math.max(0, Math.min(89, dayIndex));
        }

        function applyDailyTheme() {
            const dayIdx = getActiveDayIndex();
            const currentTheme = themeDatabase[dayIdx];
            
            audio.src = currentTheme.audioUrl;
            audio.load(); // Forces the browser to buffer the new track
            
            const root = document.documentElement;
            root.style.setProperty('--bg-gradient', currentTheme.style.bg);
            root.style.setProperty('--card-bg', currentTheme.style.card);
            root.style.setProperty('--glow-color', currentTheme.style.glow);
            root.style.setProperty('--modal-bg', currentTheme.style.modal);
            root.style.setProperty('--scratch-bg', currentTheme.style.scratch);
            root.style.setProperty('--scratch-content-bg', currentTheme.style.content);
        }

        applyDailyTheme();

        function toggleMusic() {
            if (audio.paused) {
                audio.play()
                    .then(() => musicBtn.classList.add("playing"))
                    .catch(e => alert("Please tap anywhere on the screen first, then click the music button!"));
            } else {
                audio.pause();
                musicBtn.classList.remove("playing");
            }
        }

        setInterval(() => {
            const randomBpm = Math.floor(Math.random() * (103 - 95 + 1)) + 95;
            document.getElementById("liveBpm").innerText = `❤️ ${randomBpm} BPM`;
        }, 2000);

        // ⏱️ Fixed Cross-Browser Countdown System
        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate.getTime() - now;

            if(diff <= 0) {
                document.getElementById("countdown").innerHTML = "<div style='grid-column: span 4; color: var(--glow-color); font-weight:bold; font-size:1.3rem;'>HAPPY BIRTHDAY ISAAC! 🎂</div>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = String(d).padStart(2, '0');
            document.getElementById("hours").innerText = String(h).padStart(2, '0');
            document.getElementById("minutes").innerText = String(m).padStart(2, '0');
            document.getElementById("seconds").innerText = String(s).padStart(2, '0');
        }
        setInterval(updateCountdown, 1000); 
        updateCountdown();

        let isScratched = false;
        function openDailySurprise() {
            const currentIdx = getActiveDayIndex();
            document.getElementById("mTitle").innerText = `SURPRISE BOX 🎁`;
            document.getElementById("mVerse").innerText = versesDatabase[currentIdx] || versesDatabase[0];
            document.getElementById("mKavithai").innerText = kavithaigalDatabase[currentIdx] || kavithaigalDatabase[0];
            document.getElementById("giftModal").classList.add("active");
            document.getElementById("scratchWrapper").classList.add("show");
            initScratchCard();
        }

        function initScratchCard() {
            const canvas = document.getElementById("scratchCanvas");
            const ctx = canvas.getContext("2d");
            isScratched = false; 
            canvas.style.display = 'block';
            const rect = canvas.parentNode.getBoundingClientRect();
            canvas.width = rect.width; 
            canvas.height = rect.height;
            
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--scratch-bg').trim();
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = "bold 13px Arial";
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--glow-color').trim();
            ctx.textAlign = "center";
            ctx.fillText("SCRATCH TO REVEAL YOUR GIFT 🎁", canvas.width / 2, canvas.height / 2);

            let isDrawing = false;
            function scratch(e) {
                if (!isDrawing) return;
                if (e.cancelable) e.preventDefault();
                const bounds = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - bounds.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - bounds.top;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); 
                ctx.arc(x, y, 25, 0, Math.PI * 2); 
                ctx.fill();
                checkScratchPercentage();
            }

            function checkScratchPercentage() {
                if (isScratched) return;
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let cleared = 0;
                for (let i = 3; i < imgData.data.length; i += 4) { if (imgData.data[i] === 0) cleared++; }
                if (cleared / (canvas.width * canvas.height) > 0.45) {
                    isScratched = true; 
                    canvas.style.display = 'none';
                    confetti({ particleCount: 80, spread: 60, origin: { y: 0.7 }, colors: [getComputedStyle(document.documentElement).getPropertyValue('--glow-color').trim(), '#fff3cd', '#111111'] });
                    
                    // Trigger audio immediately on scratch complete
                    if (audio.paused) { audio.play().then(() => musicBtn.classList.add("playing")).catch(e => console.log(e)); }
                }
            }
            canvas.onmousedown = () => isDrawing = true; 
            canvas.onmouseup = () => isDrawing = false; 
            canvas.onmousemove = scratch;
            canvas.ontouchstart = (e) => { isDrawing = true; }; 
            canvas.ontouchend = () => isDrawing = false; 
            canvas.ontouchmove = scratch;
        }

        function closeGift() { document.getElementById("giftModal").classList.remove("active"); }

        function setCalendarLink() {
            const base = "https://calendar.google.com/calendar/render?action=TEMPLATE&text=" + encodeURIComponent("ISAAC's 24th Birthday Celebration 🎂🎉") + "&dates=20260908T133000Z/20260908T173000Z" + "&location=" + encodeURIComponent("Madurai");
            document.getElementById("calendarLink").href = base;
        }
        setCalendarLink();

        function createParticles() {
            const container = document.getElementById("particles");
            for (let i = 0; i < 35; i++) {
                const p = document.createElement("div"); p.style.position = "absolute"; p.style.width = Math.random() * 3 + "px"; p.style.height = p.style.width; p.style.background = "rgba(255, 255, 255, " + Math.random() * 0.3 + ")"; p.style.top = Math.random() * 100 + "%"; p.style.left = Math.random() * 100 + "%"; p.style.borderRadius = "50%"; p.style.animation = `pulse ${Math.random() * 3 + 2}s infinite alternate`; container.appendChild(p);
            }
        }
        createParticles();
    </script>
